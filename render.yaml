services:
  - type: web
    name: camosignal-recommendation-email
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm run start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        value: b136f08de9540bd139b745aa15cb4043
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        value: https://camosignal-recommendation-email.onrender.com
      - key: SCOPES
        value: read_orders,write_orders,read_products,read_inventory,read_fulfillments,read_customers,write_customers
      - key: DATABASE_URL
        fromDatabase:
          name: camosignal-recommendation-email-db
          property: connectionString

databases:
  - name: camosignal-recommendation-email-db
    plan: free
    databaseName: camosignal_recommendation_email
    user: camosignal_recommendation_email
